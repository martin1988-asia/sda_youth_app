name: sda_youth_app
description: "SDA Youth App with Firebase Authentication"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase dependencies (latest stable versions compatible with firebase_core ^4.x)
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3

  # Local notifications for daily verse reminders
  flutter_local_notifications: ^17.1.2

  # Timezone support for scheduling notifications
  timezone: ^0.9.2

  # Image picker for uploading profile photos and posts
  image_picker: ^1.1.1

  # SharedPreferences for Remember Me functionality
  shared_preferences: ^2.2.2

  # URL launcher for opening links, emails, phone numbers
  url_launcher: ^6.2.5

  # Date/time formatting for notifications and feeds
  intl: ^0.19.0

  # --- Added dependencies for media posts ---
  video_player: ^2.9.1          # video playback
  visibility_detector: ^0.4.0+2 # auto-pause when off-screen
  video_thumbnail: ^0.5.3       # generate video thumbnails

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/background.jpg     # background for login/signup
    - assets/sda_logo.png       # SDA logo
    # - assets/logo.png          # app logo (optional)
    # - assets/background.png    # background (optional)
